name: Auto-Ingest from Inbox

on:
  push:
    paths:
      - 'inbox.md'

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process inbox
        run: python cli.py ingest --from-inbox
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit new knowledge files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/ inbox.md review_log.json
          git diff --staged --quiet || git commit -m "Auto-ingest from inbox [skip ci]"
          git push
